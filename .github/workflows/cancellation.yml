name: Cancellation Automation

on:
  schedule:
    - cron: "*/5 * * * *"   # every 30 mins
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install pandas requests gspread oauth2client

      - name: Run Script
        run: python cancellation.py
        env:
          RISTA_API_KEY: ${{ secrets.RISTA_API_KEY }}
