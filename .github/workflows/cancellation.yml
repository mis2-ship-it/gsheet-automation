name: Run Script

on:
  schedule:
    - cron: "*/5 * * * *"   # every 30 mins
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libs
        run: pip install pandas requests gspread oauth2client

      - name: Install dependencies
        run: pip install pandas requests gspread google-auth requests-aws4auth

      - name: Run Script
        run: python cancellation.py
        env: 
         GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
         RISTA_API_KEY: ${{ secrets.API_KEY }}
