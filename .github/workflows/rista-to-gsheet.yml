name: Rista Live to GSheet Hourly

on:
  schedule:

    # 🔹 Start run at 10:00 AM IST
    - cron: '30 4 * * *'

    # 🔹 Hourly runs from 11 AM → 11 PM IST
    - cron: '30 5-17 * * *'

    # 🔹 Midnight run (12 AM IST)
    - cron: '30 18 * * *'

    # 🔹 Final full business run at 5:30 AM IST
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
         pip install -r requirements.txt

      - name: Run Script
        env:
         GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
         API_KEY: ${{ secrets.API_KEY }}
         SECRET_KEY: ${{ secrets.SECRET_KEY }}

         EMAIL_USER: ${{ secrets.EMAIL_USER }}
         EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
         EMAIL_TO: ${{ secrets.EMAIL_TO }}
         EMAIL_CC: ${{ secrets.EMAIL_CC }}
         
        run: |
          echo "Running script..."
          python rista_live.py
